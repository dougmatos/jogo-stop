<div class="game">

  <app-roulette
    [phase]="gameService.phase()"
    [currentLetter]="gameService.currentLetter()"
  />

  @if (allDrawn()) {
    <p class="all-drawn-msg">✓ Todas as letras foram sorteadas!</p>
  } @else {
    <button class="btn-draw" [disabled]="!canDraw()" (click)="onDraw()">
      ▶ SORTEAR
    </button>
  }

  <label class="remove-option">
    <input
      type="checkbox"
      [checked]="gameService.removeWyk()"
      (change)="onToggleRemoveWyk($event)"
    />
    Remover letras W, Y e K
  </label>

  <app-alphabet-grid
    [drawnLetters]="gameService.drawnLetters()"
    [removedLetters]="gameService.removeWyk() ? removableLetters : []"
  />

  <button class="btn-reset" (click)="onNewGame()">
    ↺ Novo Jogo
  </button>

</div>
